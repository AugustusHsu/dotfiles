set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g focus-events on
# tmux 預設收到 ESC 後會等 500ms 才轉送給裡面的程式（用來判斷是不是
# Alt+按鍵送出的跳脫序列），這段等待跟 nvim 自己的 ttimeoutlen 是兩層
# 不同的延遲，兩個都要調小 Esc 才會真的感覺是立即反應。
set -sg escape-time 10

bind-key Q confirm-before -p "關閉整個 ide (#S)? (y/n)" kill-session

# vim-tmux-navigator：統一 Ctrl+hjkl 導航（跨 nvim 視窗與 tmux pane）。
# is_vim 用 ps 偵測目前 pane 是否在跑 vim/nvim：
#   在 nvim → 把按鍵送給 nvim 處理；不在 nvim → tmux 切換 pane。
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

set -g status-left-length 20
set -g status-right-length 200
set -g status-right "#[fg=colour231,bg=colour24,bold] C-/開關 C-t清單 M-z縮放  C-hjkl移動  Q關閉 d離開 #[default]"
